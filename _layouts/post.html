<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]],
          processEscapes: true
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
        }
      };
    </script>
    <script
      defer
      id="MathJax-script"
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    ></script>
    <script
      defer
      src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"
    ></script>
    <script defer src="{{ '/post.js' | relative_url }}"></script>
  </head>
  <body class="post-page">
    <main class="post-shell">
      <header class="post-header">
        <a class="post-back" href="{{ '/blog.html' | relative_url }}">Back to blog</a>
        <p class="post-meta">
          <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
          {% if page.categories and page.categories != empty %}
          <span class="post-divider">/</span>
          <span>{{ page.categories | join: ", " }}</span>
          {% endif %}
        </p>
        <h1>{{ page.title }}</h1>
        <div class="post-stats" aria-label="Article stats">
          <span class="post-stat">
            <span class="post-stat-label">Type</span>
            <span>Markdown Post</span>
          </span>
          <span class="post-stat" id="busuanzi_container_page_pv">
            <span class="post-stat-label">Views</span>
            <span><span id="busuanzi_value_page_pv"></span> reads</span>
          </span>
        </div>
      </header>

      <div class="post-layout">
        <article class="post-content" id="post-content">
          {{ content }}
        </article>

        <aside class="post-sidebar" aria-label="Article outline">
          <div class="post-outline" id="post-outline" hidden>
            <div class="post-outline-head">
              <p class="post-outline-kicker">On this page</p>
              <strong>Table of contents</strong>
            </div>
            <nav class="post-outline-nav" id="post-outline-nav"></nav>
          </div>
        </aside>
      </div>
    </main>
  </body>
</html>
